# Fly.io config for the backend (FastAPI).
# First-time setup and deploy commands are in DEPLOY.md. Deploy from this
# directory:  cd backend && fly deploy
#
# IMPORTANT: change `app` to a globally-unique name before first launch
# (or let `fly launch` set it for you).

app = "stockdashboard"
primary_region = "iad" # pick one near you: https://fly.io/docs/reference/regions/

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/var/data"

[http_service]
  internal_port = 8000
  force_https = true
  # Keep one machine running 24/7 so the data-refresh scheduler never sleeps.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/api/health"

# Persists watchlists across deploys (mounted at DATA_DIR above).
[mounts]
  source = "data"
  destination = "/var/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb" # headroom for pandas / yfinance
